{
  "debug": true,
  "kafka": {
    "bootstrap_servers": ["127.0.0.1:9092"],
    "security_protocol": "SASL_PLAINTEXT",
    "sasl": {
      "mechanism": "PLAIN",
      "username": "kafka",
      "password": "CHANGE_ME"
    }
  },
  "consumer": {
    "topic": "selk.suricata.eve",
    "group_id": "justsoc-threat-engine"
  },
  "sink": {
    "mode": "kafka",
    "batch_size": 100,
    "flush_interval_ms": 50,
    "queue_size": 1000,
    "workers": 1,
    "kafka": {
      "topic": "selk.alerts.enriched"
    },
    "es": {
      "endpoint": "http://127.0.0.1:9200",
      "index": "selk-suricata-%{+YYYY.MM.dd}"
    }
  },
  "whitelist": {
    "path": "whitelist.example.json"
  },
  "rules": {
    "path": "engine-rules.yaml",
    "suricata_dir": "../../suricata-rules"
  },
  "assets": {
    "path": ""
  }
}

