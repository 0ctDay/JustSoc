input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP:kafka:9092}"
    topics => ["selk.alerts.enriched"]
    group_id => "selk-logstash-enriched"
    codec => json
    auto_offset_reset => "latest"
    security_protocol => "SASL_PLAINTEXT"
    sasl_mechanism => "PLAIN"
    sasl_jaas_config => 'org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_SASL_USERNAME:kafka}" password="${KAFKA_SASL_PASSWORD:<change-me>}";'
  }
}

filter {
  mutate {
  remove_field => [
    "[event][original]",
    "[stream]",
    "[ts_progress]",
    "[@version]"
   ]
  }
  ruby {
    code => '
      # Remove redundant flat fields from correlated_http that duplicate top-level values
      redundant = ["proto", "pkt_src", "event_type", "tx_id", "in_iface", "ip_v"]
      redundant.each do |f|
        event.get("[correlated_http]").delete(f) if event.get("[correlated_http]")
      end
    '
  }

  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  } else if [ingested_at] {
    date {
      match => ["ingested_at", "ISO8601"]
      target => "@timestamp"
    }
  }

  mutate {
    add_field => {
      "[event][dataset]" => "selk.suricata"
      "[observer][type]" => "ids"
    }
  }

  if [sensor_id] {
    mutate {
      copy => { "sensor_id" => "[observer][name]" }
    }
  }

  ruby {
    code => '
      src_ip = event.get("[correlated_http][src_ip]") || event.get("[flow][src_ip]") || event.get("src_ip")
      src_port = event.get("[correlated_http][src_port]") || event.get("[flow][src_port]") || event.get("src_port")
      dest_ip = event.get("[correlated_http][dest_ip]") || event.get("[flow][dest_ip]") || event.get("dest_ip")
      dest_port = event.get("[correlated_http][dest_port]") || event.get("[flow][dest_port]") || event.get("dest_port")

      event.set("[source][ip]", src_ip) if src_ip
      event.set("[source][port]", src_port) if src_port
      event.set("[destination][ip]", dest_ip) if dest_ip
      event.set("[destination][port]", dest_port) if dest_port

      severity = event.get("[alert][severity]")
      if severity
        level = severity.to_i
        label = if level <= 1
          "紧急"
        elsif level == 2
          "高危"
        elsif level == 3
          "中危"
        else
          "低危"
        end
        event.set("[event][severity]", label)
      end

      selk_category = event.get("[alert][metadata][selk_category]")
      if src_ip && selk_category
        category_value = selk_category.is_a?(Array) ? selk_category.first : selk_category
        category_value = category_value.to_s.strip
        if category_value != ""
          event.set("[selk][src_ip_category]", "#{src_ip}||#{category_value}")
        end
      end
    '
  }

  if [proto] {
    mutate {
      add_field => { "[network][transport]" => "%{proto}" }
      lowercase => ["[network][transport]"]
    }
  }

  if [app_proto] {
    mutate {
      add_field => { "[network][protocol]" => "%{app_proto}" }
      lowercase => ["[network][protocol]"]
    }
  }
  if [engine][behavior] == "directory_scan" {
    mutate {
      replace => { "event_type" => "alert" }
    }
  }
  if [alert][signature] {
    mutate {
      add_field => { "[rule][name]" => "%{[alert][signature]}" }
    }
  }

  if [alert][signature_id] {
    mutate {
      add_field => { "[rule][id]" => "%{[alert][signature_id]}" }
    }
  }
}

output {
  if [event_type] == "alert" {
    elasticsearch {
      hosts => ["${ES_HOSTS:http://elasticsearch:9200}"]
      index => "selk-suricata-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["${ES_HOSTS:http://elasticsearch:9200}"]
      index => "selk-event-%{+YYYY.MM.dd}"
    }
  }
}
